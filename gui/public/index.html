<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TEAM // CONSOLE · 4-Agent Claude Code</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Hanken+Grotesk:wght@400;500;600;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#06080d; --bg2:#0a0e16; --panel:#0d1220; --panel2:#0b101c;
    --border:#1a2233; --border2:#232e44; --fg:#e8ecf5; --muted:#7c869c; --dim:#586079;
    --accent:#5b8cff; --good:#54e6a8; --warn:#ffcf5c; --bad:#ff6b7d; --idle:#8a93ad;
    --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
    --ui:"Hanken Grotesk",ui-sans-serif,system-ui,"Segoe UI",Roboto,sans-serif;
    --lead:#f5b94a; --backend:#36d6c3; --frontend:#f06bd2; --quality:#7ee787;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  html { background:#06080d; }
  body {
    margin:0; color:var(--fg); font:14px/1.45 var(--ui);
    background:
      radial-gradient(900px 500px at 12% -8%, rgba(91,140,255,.10), transparent 60%),
      radial-gradient(800px 520px at 100% 0%, rgba(240,107,210,.07), transparent 55%),
      linear-gradient(var(--bg), var(--bg2));
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  /* faint grid texture overlay */
  body::before {
    content:""; position:fixed; inset:0; pointer-events:none; opacity:.5; z-index:0;
    background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
    background-size:42px 42px; mask-image:radial-gradient(circle at 50% 0%,#000,transparent 85%);
  }
  body > * { position:relative; z-index:1; }

  /* ---------- app bar ---------- */
  .appbar { display:flex; align-items:center; gap:14px; padding:12px 18px;
            border-bottom:1px solid var(--border); background:rgba(8,11,18,.72);
            backdrop-filter:blur(8px); flex-wrap:wrap; }
  .brand { display:flex; align-items:baseline; gap:2px; font-family:var(--mono); font-weight:700;
           letter-spacing:.5px; font-size:15px; white-space:nowrap; user-select:none; }
  .brand .b1 { color:var(--fg); } .brand .b2 { color:var(--accent); }
  .brand .caret { width:8px; height:16px; margin-left:4px; background:var(--accent);
                  display:inline-block; transform:translateY(2px); animation:blink 1.1s steps(1) infinite; }
  @keyframes blink { 50% { opacity:0; } }

  #goal { flex:1 1 280px; min-width:200px; height:38px; max-height:96px; resize:vertical;
          background:var(--panel); color:var(--fg); border:1px solid var(--border2);
          border-radius:9px; padding:9px 12px; font:13px/1.4 var(--ui); transition:border-color .15s,box-shadow .15s; }
  #goal:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(91,140,255,.18); }

  .btn { font:600 13px/1 var(--ui); color:var(--fg); background:var(--panel); cursor:pointer;
         border:1px solid var(--border2); border-radius:9px; padding:10px 14px; white-space:nowrap;
         transition:border-color .15s,background .15s,transform .06s,color .15s; }
  .btn:hover { border-color:var(--accent); color:#fff; }
  .btn:active { transform:translateY(1px); }
  .btn.primary { color:#06121f; background:linear-gradient(180deg,#7aa2ff,#4f86ff);
                 border-color:#7aa2ff; box-shadow:0 6px 20px -8px rgba(91,140,255,.7); }
  .btn.primary:hover { filter:brightness(1.07); color:#06121f; }
  .conn { display:flex; align-items:center; gap:7px; color:var(--muted); font:600 12px var(--mono); }
  .conn .pulse { width:9px; height:9px; border-radius:50%; background:var(--dim); position:relative; }
  .conn .pulse.on { background:var(--good); box-shadow:0 0 0 0 rgba(84,230,168,.6); animation:ring 1.8s infinite; }
  .conn .pulse.off { background:var(--bad); }
  @keyframes ring { 0%{box-shadow:0 0 0 0 rgba(84,230,168,.5);} 70%{box-shadow:0 0 0 7px rgba(84,230,168,0);} 100%{box-shadow:0 0 0 0 rgba(84,230,168,0);} }

  /* ---------- vitals strip ---------- */
  .vitals { display:flex; align-items:center; gap:20px; padding:11px 18px;
            border-bottom:1px solid var(--border); background:rgba(10,14,22,.5); flex-wrap:wrap; }
  .pwrap { flex:1 1 260px; min-width:220px; }
  .ptrack { height:9px; border-radius:6px; overflow:hidden; display:flex; background:#0a0f1a;
            border:1px solid var(--border); }
  .seg { height:100%; transition:width .5s cubic-bezier(.4,0,.2,1); }
  .seg.done{background:linear-gradient(90deg,#3ed598,#54e6a8);} .seg.doing{background:var(--warn);}
  .seg.blocked{background:var(--bad);} .seg.todo{background:#2a3550;}
  .pmeta { margin-top:6px; font:600 12px var(--mono); color:var(--muted); }
  .pmeta b { color:var(--fg); }
  .avitals { display:flex; gap:9px; flex-wrap:wrap; }
  .vchip { display:flex; align-items:center; gap:7px; padding:6px 11px 6px 9px; border-radius:999px;
           background:var(--panel); border:1px solid var(--border2); font:600 12px var(--ui);
           color:var(--fg); text-transform:capitalize; }
  .vchip .vdot { width:8px; height:8px; border-radius:50%; background:var(--accent);
                 box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 22%,transparent); }
  .vchip em { font-style:normal; font:600 11px var(--mono); color:var(--muted); }
  .vchip small { font:600 11px var(--mono); color:var(--dim); }
  .vchip.active { border-color:color-mix(in srgb,var(--accent) 55%,var(--border2)); }
  .vchip.idle .vdot { background:var(--idle); box-shadow:none; }
  .vchip.stale, .vchip.no-log { border-color:rgba(255,107,125,.5); }
  .vchip.stale .vdot, .vchip.no-log .vdot { background:var(--bad); box-shadow:0 0 0 3px rgba(255,107,125,.18); }
  .vchip.stale em, .vchip.no-log em { color:var(--bad); }

  /* ---------- grid of agent decks ---------- */
  #grid { flex:1; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr;
          gap:12px; padding:14px 18px 18px; min-height:0; }
  .card { --accent:var(--accent); display:flex; flex-direction:column; min-height:0; overflow:hidden;
          background:linear-gradient(180deg,var(--panel),var(--panel2));
          border:1px solid var(--border); border-radius:14px; position:relative;
          box-shadow:0 18px 40px -28px rgba(0,0,0,.9); }
  /* entrance is an enhancement only — cards stay visible if motion is reduced/disabled */
  @media (prefers-reduced-motion: no-preference) {
    .card { opacity:0; transform:translateY(10px); animation:rise .5s forwards; }
  }
  @keyframes rise { to { opacity:1; transform:none; } }
  .card::before { content:""; position:absolute; inset:0 0 auto 0; height:2px;
                  background:linear-gradient(90deg,var(--accent),transparent 75%); opacity:.9; }
  .card.live { box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 40%,transparent),
                          0 22px 50px -30px color-mix(in srgb,var(--accent) 60%,#000); }
  .card h2 { margin:0; padding:10px 13px; display:flex; align-items:center; gap:9px;
             font:700 13px var(--mono); letter-spacing:.3px; border-bottom:1px solid var(--border);
             color:var(--fg); background:rgba(255,255,255,.012); }
  .card h2 .tag { color:var(--accent); }
  .card h2 .dot { width:9px; height:9px; border-radius:50%; background:var(--dim); flex:none; transition:.2s; }
  .card h2 .dot.on { background:var(--accent); box-shadow:0 0 10px color-mix(in srgb,var(--accent) 70%,transparent); }
  .card h2 .dot.off { background:var(--bad); }
  .spacer { flex:1; }
  .icon-btn { font:600 11px var(--mono); color:var(--muted); background:transparent; cursor:pointer;
              border:1px solid var(--border2); border-radius:7px; padding:5px 9px; transition:.15s; }
  .icon-btn:hover { color:var(--fg); border-color:var(--accent); }

  .term { flex:1; min-height:0; padding:6px 8px; }
  .foot { border-top:1px solid var(--border); padding:8px; display:flex; flex-direction:column; gap:7px; }
  .msgrow { display:flex; gap:7px; }
  .msg { flex:1; min-width:0; background:#070b13; color:var(--fg); border:1px solid var(--border2);
         border-radius:8px; padding:8px 10px; font:13px var(--ui); transition:border-color .15s; }
  .msg:focus { outline:none; border-color:var(--accent); }
  .keys { display:flex; gap:5px; flex-wrap:wrap; }
  .keys .icon-btn { padding:5px 8px; }
  .keys .icon-btn.send { color:var(--accent); border-color:color-mix(in srgb,var(--accent) 45%,var(--border2)); }

  .legend { font:600 11px var(--mono); color:var(--dim); padding:0 18px 10px; }
  .legend b { color:var(--muted); }

  @media (max-width:920px){
    #grid { grid-template-columns:1fr; grid-template-rows:repeat(4,minmax(260px,1fr)); }
    .vitals { gap:12px; }
  }
</style>
</head>
<body>
  <header class="appbar">
    <div class="brand"><span class="b1">TEAM</span><span class="b2">//</span><span class="b1">CONSOLE</span><span class="caret"></span></div>
    <textarea id="goal" placeholder="Goal for the LEAD — paste what the team should build or fix…"></textarea>
    <button class="btn primary" id="kickoff" title="Send each agent its role prompt (Lead first), with the Goal injected">▶ Kickoff all</button>
    <button class="btn" id="statusAll" title="Send 'state' to every agent">↻ state → all</button>
    <span class="conn"><span id="conn" class="pulse"></span><span id="connTxt">connecting…</span></span>
  </header>

  <section class="vitals">
    <div class="pwrap">
      <div class="ptrack" id="ptrack">
        <span class="seg done"></span><span class="seg doing"></span><span class="seg blocked"></span><span class="seg todo"></span>
      </div>
      <div class="pmeta" id="pmeta">board — waiting for .team/board.md…</div>
    </div>
    <div class="avitals" id="avitals"></div>
  </section>

  <main id="grid"></main>
  <div class="legend">
    <b>tip:</b> click into any panel to type directly · Enter sends the message box · vitals refresh from <b>.team/</b> every 3s
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script>
    const ACCENTS = { lead:"#f5b94a", backend:"#36d6c3", frontend:"#f06bd2", quality:"#7ee787" };
    const accentFor = (id) => {
      if (ACCENTS[id]) return ACCENTS[id];
      let h = 0; for (const ch of id) h = (h * 31 + ch.charCodeAt(0)) % 360;
      return `hsl(${h} 72% 62%)`;
    };
    const human = (s) => s < 0 ? "—" : s < 60 ? s + "s" : s < 3600 ? Math.round(s/60) + "m" : Math.round(s/3600) + "h";

    const terms = {};
    let ws, cfg;

    const send = (o) => { if (ws && ws.readyState === 1) ws.send(JSON.stringify(o)); };
    const input = (id, d) => send({ t: "i", id, d });
    const paste = (id, text) => input(id, "\x1b[200~" + text + "\x1b[201~"); // bracketed paste
    const flatten = (s) => (s || "").replace(/\s*\n\s*/g, " ").trim();

    function sendPrompt(id) {
      const a = cfg.agents.find((x) => x.id === id); if (!a) return;
      const goal = document.getElementById("goal").value || "<<< describe the goal >>>";
      paste(id, flatten((a.prompt || "").replace("{{GOAL}}", goal)));
      input(id, "\r");
    }
    function sendMsg(id) {
      const m = document.getElementById("msg-" + id); if (!m.value) return;
      paste(id, m.value); input(id, "\r"); m.value = "";
    }

    async function boot() {
      cfg = await (await fetch("/agents")).json();
      const grid = document.getElementById("grid");
      cfg.agents.forEach((a, i) => {
        const accent = accentFor(a.id);
        const card = document.createElement("div");
        card.className = "card"; card.id = "card-" + a.id;
        card.style.setProperty("--accent", accent);
        card.style.animationDelay = (i * 80) + "ms";
        card.innerHTML = `
          <h2><span class="dot" id="dot-${a.id}"></span>${a.label}
            <span class="tag">#${a.id}</span>
            <span class="spacer"></span>
            <button class="icon-btn" data-act="start" data-id="${a.id}" title="restart this agent">⟳ restart</button>
          </h2>
          <div class="term" id="term-${a.id}"></div>
          <div class="foot">
            <div class="msgrow">
              <input class="msg" id="msg-${a.id}" placeholder="message ${a.label} — Enter sends" />
              <button class="icon-btn send" data-act="sendmsg" data-id="${a.id}">Send ➤</button>
            </div>
            <div class="keys">
              <button class="icon-btn send" data-act="prompt" data-id="${a.id}" title="send this agent its role prompt">⮞ prompt</button>
              <button class="icon-btn" data-act="enter"  data-id="${a.id}">⏎ Enter</button>
              <button class="icon-btn" data-act="state" data-id="${a.id}">state</button>
              <button class="icon-btn" data-act="y"      data-id="${a.id}">y</button>
              <button class="icon-btn" data-act="esc"    data-id="${a.id}">Esc</button>
              <button class="icon-btn" data-act="sigint" data-id="${a.id}">^C</button>
            </div>
          </div>`;
        grid.appendChild(card);

        // one agent's terminal failing must never abort the rest of the console
        try {
          const term = new Terminal({ fontSize: 12, fontFamily: '"JetBrains Mono",ui-monospace,monospace',
            cursorBlink: true, theme: { background: "#0a0f1a", foreground: "#e8ecf5", cursor: accent } });
          const fit = new FitAddon.FitAddon();
          term.loadAddon(fit); term.open(document.getElementById("term-" + a.id));
          try { fit.fit(); } catch {}
          term.onData((d) => input(a.id, d));
          terms[a.id] = { term, fit };
        } catch (err) {
          const el = document.getElementById("term-" + a.id);
          if (el) el.innerHTML = '<div style="padding:14px;color:var(--muted);font:12px var(--mono)">terminal unavailable — ' + (err && err.message || err) + '</div>';
        }

        const mbox = document.getElementById("msg-" + a.id);
        if (mbox) mbox.addEventListener("keydown", (e) => {
          if (e.key === "Enter") { e.preventDefault(); sendMsg(a.id); }
        });
      });

      const doFit = () => {
        for (const id in terms) {
          try { terms[id].fit.fit(); } catch {}
          const t = terms[id].term; send({ t: "resize", id, cols: t.cols, rows: t.rows });
        }
      };
      window.addEventListener("resize", () => { clearTimeout(window._rt); window._rt = setTimeout(doFit, 150); });
      setTimeout(doFit, 350);

      grid.addEventListener("click", (e) => {
        const b = e.target.closest("button"); if (!b) return;
        const { id, act } = b.dataset;
        if (act === "enter") input(id, "\r");
        else if (act === "state") input(id, "state\r");
        else if (act === "y") input(id, "y\r");
        else if (act === "esc") input(id, "\x1b");
        else if (act === "sigint") input(id, "\x03");
        else if (act === "start") send({ t: "start", id });
        else if (act === "prompt") sendPrompt(id);
        else if (act === "sendmsg") sendMsg(id);
      });

      document.getElementById("kickoff").addEventListener("click", () => {
        cfg.agents.forEach((a, i) => setTimeout(() => sendPrompt(a.id), i * 700));
      });
      document.getElementById("statusAll").addEventListener("click", () => {
        for (const a of cfg.agents) input(a.id, "state\r");
      });

      connect();
      pollStatus(); setInterval(pollStatus, 3000);
    }

    function renderVitals(s) {
      const c = s.counts || {}, total = c.total || 0;
      const pct = (n) => total ? (100 * (n || 0) / total) : 0;
      const segs = document.querySelectorAll("#ptrack .seg");
      segs[0].style.width = pct(c.done) + "%"; segs[1].style.width = pct(c.doing) + "%";
      segs[2].style.width = pct(c.blocked) + "%"; segs[3].style.width = pct(c.todo) + "%";
      document.getElementById("pmeta").innerHTML = total
        ? `<b>${c.done || 0}/${total}</b> done · ${c.doing || 0} doing · ${c.blocked || 0} blocked · ${c.todo || 0} todo`
        : "board — no tasks yet";
      document.getElementById("avitals").innerHTML = (s.roles || []).map((r) =>
        `<span class="vchip ${r.state}" style="--accent:${accentFor(r.id)}">
           <span class="vdot"></span>${r.id}<em>${r.state}</em><small>${human(r.ageSec)}</small></span>`).join("");
    }
    async function pollStatus() {
      try { renderVitals(await (await fetch("/state")).json()); } catch { /* offline */ }
    }

    function connect() {
      ws = new WebSocket((location.protocol === "https:" ? "wss" : "ws") + "://" + location.host);
      const dot = document.getElementById("conn"), txt = document.getElementById("connTxt");
      ws.onopen = () => { dot.className = "pulse on"; txt.textContent = "connected"; };
      ws.onclose = () => { dot.className = "pulse off"; txt.textContent = "reconnecting…"; setTimeout(connect, 1500); };
      ws.onmessage = (ev) => {
        const m = JSON.parse(ev.data);
        if (m.t === "o" && terms[m.id]) terms[m.id].term.write(m.d);
        else if (m.t === "started") setLive(m.id, true);
        else if (m.t === "exit") {
          setLive(m.id, false);
          if (terms[m.id]) terms[m.id].term.write("\r\n\x1b[31m[process exited]\x1b[0m\r\n");
        }
      };
    }
    function setLive(id, on) {
      const d = document.getElementById("dot-" + id); if (d) d.className = "dot " + (on ? "on" : "off");
      const card = document.getElementById("card-" + id); if (card) card.classList.toggle("live", on);
    }

    boot();
  </script>
</body>
</html>
